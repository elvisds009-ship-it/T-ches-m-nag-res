<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tâches ménagères</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e4e2db;
    --border-strong: #cccac1;
    --text: #1a1a18;
    --muted: #7a7870;
    --accent: #4a3fa0;
    --accent-light: #eeedfc;
    --success: #166534;
    --success-bg: #dcfce7;
    --danger: #991b1b;
    --danger-bg: #fee2e2;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  header {
    max-width: 860px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: baseline;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.25rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header span {
    font-size: 13px;
    color: var(--muted);
  }

  .container { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.25rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  input[type="text"], input[type="number"], select {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,63,160,0.12);
  }

  button {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    border: none;
  }

  button:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d349a; }
  .btn-danger { background: var(--danger-bg); color: var(--danger); }
  .btn-danger:hover { background: #fecaca; }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

  .tag {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }

  .tag button {
    background: none; border: none; padding: 0; font-size: 15px;
    line-height: 1; cursor: pointer; opacity: 0.6;
  }
  .tag button:hover { opacity: 1; }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }

  .stat {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 12px 16px;
  }

  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }

  thead th {
    background: var(--bg);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }
  tbody tr.done { background: var(--success-bg); }
  tbody tr.done .task-name { text-decoration: line-through; color: var(--muted); }

  .task-name { font-weight: 500; }

  input[type="checkbox"] {
    width: 17px; height: 17px; cursor: pointer;
    accent-color: var(--accent);
    border-radius: 4px;
  }

  .child-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }

  .price-badge {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    color: var(--muted);
    font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }

  .icon-btn:hover { background: var(--danger-bg); color: var(--danger); }

  .empty-row td {
    text-align: center;
    padding: 2.5rem;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    header { flex-direction: column; gap: 4px; }
    .row { flex-direction: column; align-items: stretch; }
    .row input, .row select, .row button { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>🧹 Tâches ménagères</h1>
  <span id="headerDate"></span>
</header>

<div class="container">

  <!-- Summary -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- Children -->
  <div class="card">
    <div class="card-title">👦 Enfants</div>
    <div class="row">
      <input type="text" id="childInput" placeholder="Prénom de l'enfant..." maxlength="30" style="flex:1;min-width:160px" />
      <button class="btn-primary" onclick="addChild()">+ Ajouter</button>
    </div>
    <div class="tags" id="childTags"><span style="font-size:12px;color:var(--muted)">Aucun enfant pour l'instant.</span></div>
  </div>

  <!-- Add task -->
  <div class="card">
    <div class="card-title">➕ Nouvelle tâche</div>
    <div class="row">
      <input type="text" id="taskInput" placeholder="Nom de la tâche..." maxlength="60" style="flex:2;min-width:160px" />
      <input type="number" id="priceInput" placeholder="Prix €" min="0" max="999" step="0.5" style="width:110px" />
      <select id="childSelect" style="min-width:130px">
        <option value="">— Enfant —</option>
      </select>
      <button class="btn-primary" onclick="addTask()">+ Ajouter</button>
    </div>
  </div>

  <!-- Task table -->
  <div class="card" style="padding: 1.25rem 0; overflow: hidden;">
    <div class="card-title" style="padding: 0 1.5rem 0">📋 Liste des tâches</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px">✓</th>
            <th>Tâche</th>
            <th>Enfant</th>
            <th>Prix</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
        <tbody id="taskBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const COLORS = [
  { bg:'#eeedfc', border:'#b8b0f0', text:'#3d349a' },
  { bg:'#dcfce7', border:'#86efac', text:'#166534' },
  { bg:'#fee2e2', border:'#fca5a5', text:'#991b1b' },
  { bg:'#fef9c3', border:'#fde047', text:'#854d0e' },
  { bg:'#e0f2fe', border:'#7dd3fc', text:'#0c4a6e' },
  { bg:'#fce7f3', border:'#f9a8d4', text:'#9d174d' },
  { bg:'#f3e8ff', border:'#d8b4fe', text:'#6b21a8' },
  { bg:'#ffedd5', border:'#fdba74', text:'#9a3412' },
];

const DEFAULT_TASKS = [
  { id:1, name:"Passer l'aspirateur", price:1.5, child:'', done:false },
  { id:2, name:'Faire la vaisselle', price:0.5, child:'', done:false },
  { id:3, name:'Sortir les poubelles', price:1, child:'', done:false },
  { id:4, name:'Ranger sa chambre', price:0.5, child:'', done:false },
  { id:5, name:'Mettre le linge à laver', price:1, child:'', done:false },
  { id:6, name:'Mettre la table', price:0.5, child:'', done:false },
  { id:7, name:'Arroser les plantes', price:0.5, child:'', done:false },
  { id:8, name:'Nettoyer la salle de bain', price:2, child:'', done:false },
];

let tasks = DEFAULT_TASKS.map(t => ({...t}));
let children = [];
let nextId = 100;

function save() {
  try { localStorage.setItem('taches_data', JSON.stringify({ tasks, children, nextId })); } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('taches_data'));
    if (d) { tasks = d.tasks; children = d.children; nextId = d.nextId; }
  } catch(e) {}
}

function childColor(name) {
  const i = children.indexOf(name);
  return COLORS[i % COLORS.length] || COLORS[0];
}

function addChild() {
  const el = document.getElementById('childInput');
  const name = el.value.trim();
  if (!name || children.includes(name)) { el.focus(); return; }
  children.push(name);
  el.value = '';
  save(); render();
}

function removeChild(name) {
  children = children.filter(c => c !== name);
  tasks.forEach(t => { if (t.child === name) t.child = ''; });
  save(); render();
}

function addTask() {
  const nameEl = document.getElementById('taskInput');
  const priceEl = document.getElementById('priceInput');
  const childEl = document.getElementById('childSelect');
  const name = nameEl.value.trim();
  const price = parseFloat(priceEl.value);
  if (!name) { nameEl.focus(); return; }
  tasks.push({ id: nextId++, name, price: isNaN(price) ? 0 : price, child: childEl.value, done: false });
  nameEl.value = ''; priceEl.value = ''; childEl.value = '';
  save(); render();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function removeTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function assignChild(id, val) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.child = val; save(); render(); }
}

function render() {
  renderTags();
  renderSelect();
  renderTable();
  renderSummary();
}

function renderTags() {
  const el = document.getElementById('childTags');
  if (!children.length) {
    el.innerHTML = '<span style="font-size:12px;color:var(--muted)">Aucun enfant pour l\'instant.</span>';
    return;
  }
  el.innerHTML = children.map(c => {
    const col = childColor(c);
    return `<div class="tag" style="background:${col.bg};border-color:${col.border};color:${col.text}">
      ${c}
      <button onclick="removeChild('${c}')" title="Supprimer" style="color:${col.text}">×</button>
    </div>`;
  }).join('');
}

function renderSelect() {
  const sel = document.getElementById('childSelect');
  const val = sel.value;
  sel.innerHTML = '<option value="">— Enfant —</option>' + children.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = val;
}

function renderTable() {
  const body = document.getElementById('taskBody');
  if (!tasks.length) {
    body.innerHTML = '<tr class="empty-row"><td colspan="5">Aucune tâche. Ajoutez-en une ci-dessus !</td></tr>';
    return;
  }
  body.innerHTML = tasks.map(t => {
    const col = t.child ? childColor(t.child) : null;
    const childOpts = '<option value="">—</option>' + children.map(c => `<option value="${c}" ${t.child===c?'selected':''}>${c}</option>`).join('');
    return `<tr class="${t.done ? 'done' : ''}">
      <td style="text-align:center"><input type="checkbox" ${t.done?'checked':''} onchange="toggleDone(${t.id})" /></td>
      <td class="task-name">${t.name}</td>
      <td>
        <select onchange="assignChild(${t.id},this.value)" style="font-size:12px;padding:4px 8px;border-radius:20px;${col?`background:${col.bg};border-color:${col.border};color:${col.text}`:''}">
          ${childOpts}
        </select>
      </td>
      <td class="price-cell">
        ${t.price > 0 ? `<span class="price-badge">${t.price.toFixed(2)} €</span>` : '<span style="color:var(--muted)">—</span>'}
      </td>
      <td><button class="icon-btn" onclick="removeTask(${t.id})" title="Supprimer">🗑</button></td>
    </tr>`;
  }).join('');
}

function renderSummary() {
  const done = tasks.filter(t => t.done).length;
  const total = tasks.reduce((s,t) => s+(t.price||0), 0);
  const earned = tasks.filter(t=>t.done).reduce((s,t) => s+(t.price||0), 0);
  const remaining = total - earned;

  let html = `
    <div class="stat"><div class="stat-label">Tâches terminées</div><div class="stat-value">${done} / ${tasks.length}</div></div>
    <div class="stat"><div class="stat-label">Gains distribués</div><div class="stat-value" style="color:#166534">${earned.toFixed(2)} €</div></div>
    <div class="stat"><div class="stat-label">Reste à gagner</div><div class="stat-value" style="color:var(--accent)">${remaining.toFixed(2)} €</div></div>
  `;

  children.forEach((c, i) => {
    const col = COLORS[i % COLORS.length];
    const childDone = tasks.filter(t => t.child===c && t.done).reduce((s,t)=>s+(t.price||0),0);
    const childTotal = tasks.filter(t => t.child===c).reduce((s,t)=>s+(t.price||0),0);
    html += `<div class="stat" style="background:${col.bg};border:1px solid ${col.border}">
      <div class="stat-label" style="color:${col.text}">${c}</div>
      <div class="stat-value" style="color:${col.text}">${childDone.toFixed(2)} €
        <span style="font-size:13px;font-weight:400"> / ${childTotal.toFixed(2)} €</span>
      </div>
    </div>`;
  });

  document.getElementById('summaryGrid').innerHTML = html;
}

document.getElementById('childInput').addEventListener('keydown', e => { if(e.key==='Enter') addChild(); });
document.getElementById('taskInput').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

load();
render();
</script>
</body>
</html>
